<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dashboard</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        color: #111;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 18px;
      }
      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
      }
      button {
        padding: 8px 12px;
        border: 1px solid #111827;
        background: #111827;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #0b1220;
      }
      .danger {
        background: #991b1b;
        border-color: #991b1b;
      }
      .danger:hover {
        background: #7f1d1d;
      }
      .section {
        margin-top: 16px;
      }
      h2 {
        margin-top: 0;
      }
      h3 {
        margin-bottom: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .field {
        margin: 10px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #e5e7eb;
        padding: 10px;
        text-align: left;
      }
      th {
        background: #f9fafb;
      }
      .error {
        background: #fff1f2;
        border: 1px solid #fecdd3;
        color: #9f1239;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 12px;
      }
      hr {
        border: 0;
        border-top: 1px solid #e5e7eb;
        margin: 16px 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <form method="post" action="{{ url_for('logout') }}">
          <button type="submit">Logout</button>
        </form>
      </div>

      <h2>Dashboard</h2>

      <div class="grid">
        <div class="section">
          <h3>Add record</h3>

          {% if error %}
            <div class="error">{{ error }}</div>
          {% endif %}

          <form method="post" action="{{ url_for('dashboard') }}">
            <input type="hidden" name="action" value="add" />
            <div class="field">
              <label for="name">Name</label>
              <input id="name" type="text" name="name" required />
            </div>
            <div class="field">
              <label for="vaccine">Vaccine</label>
              <input id="vaccine" type="text" name="vaccine" required />
            </div>
            <div class="field">
              <button type="submit">Add</button>
            </div>
          </form>
        </div>

        <div class="section">
          <h3>All patients</h3>

          {% if patients and patients|length > 0 %}
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Vaccine</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {% for p in patients %}
                  <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.vaccine }}</td>
                    <td>
                      <form method="post" action="{{ url_for('dashboard') }}">
                        <input type="hidden" name="action" value="delete" />
                        <input type="hidden" name="id" value="{{ p.id }}" />
                        <button class="danger" type="submit" onclick="return confirm('Delete this record?')">Delete</button>
                      </form>
                    </td>
                  </tr>
                {% endfor %}
              </tbody>
            </table>
          {% else %}
            <p>No records yet.</p>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
